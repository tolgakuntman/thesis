# Default training configuration — frozen protocol (2026-04-11)
# Usage: python scripts/training/train.py  (these are the default values)

# Model
model: sage                     # sage | rgcn | mlp
hidden: 128
dropout: 0.3
feat_dropout: 0.0

# Training
epochs: 60
batch_size: 128
lr: 1.0e-3
weight_decay: 5.0e-4
patience: 10
warmup_epochs: 3

# Focal loss
focal_gamma: 1.5
focal_alpha: 0.65

# Seeds (for multi-seed final runs)
seeds: [42, 123, 7]

# Data
split_type: repo_split          # repo_split | temporal_split
perrepo_norm: false

# Output
output_dir: checkpoints
ckpt_every: 10                  # save milestone checkpoints every N epochs (0=disable)

# Hardware
num_workers: 4
