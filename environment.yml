name: thesis
channels:
  - pytorch
  - nvidia
  - pyg
  - conda-forge
  - defaults
dependencies:
  - python=3.11
  - pip
  # Core ML
  - pytorch>=2.6.0
  - pytorch-cuda=12.1
  - pip:
    - torch_geometric>=2.6.0
    - torch_scatter
    - torch_sparse
    - torch_cluster
    # Data
    - numpy>=1.24
    - pandas>=1.5
    - scikit-learn>=1.2
    - scipy>=1.10
    # Visualization
    - matplotlib>=3.6
    - networkx>=3.0
    # Utilities
    - tqdm>=4.64
    - PyYAML>=6.0
